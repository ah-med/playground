<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Back</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LEFT: Characters -->
<div class="left" id="leftPanel">
  <div class="stage" id="stage">

    <!-- Char A: Purple square -->
    <div class="char" id="charA">
      <div class="eyes" id="eyesA">
        <div class="eye" id="eyeA1"><div class="pupil" id="pupilA1"></div></div>
        <div class="eye" id="eyeA2"><div class="pupil" id="pupilA2"></div></div>
      </div>
      <div class="mouth" id="mouthA"></div>
    </div>

    <!-- Char B: Orange round -->
    <div class="char" id="charB">
      <div class="eyes" id="eyesB">
        <div class="eye" id="eyeB1"><div class="pupil" id="pupilB1"></div></div>
        <div class="eye" id="eyeB2"><div class="pupil" id="pupilB2"></div></div>
      </div>
      <div class="mouth" id="mouthB"></div>
      <div class="blush" id="blushBL"></div>
      <div class="blush" id="blushBR"></div>
    </div>

    <!-- Char C: Dark tall -->
    <div class="char" id="charC">
      <div class="eyes" id="eyesC">
        <div class="eye" id="eyeC1"><div class="pupil" id="pupilC1"></div></div>
        <div class="eye" id="eyeC2"><div class="pupil" id="pupilC2"></div></div>
      </div>
      <div class="mouth" id="mouthC"></div>
    </div>

    <!-- Char D: Yellow bean -->
    <div class="char" id="charD">
      <div class="eyes" id="eyesD">
        <div class="eye" id="eyeD1"><div class="pupil" id="pupilD1"></div></div>
        <div class="eye" id="eyeD2"><div class="pupil" id="pupilD2"></div></div>
      </div>
      <div class="mouth" id="mouthD"></div>
    </div>

  </div>
</div>

<!-- RIGHT: Form -->
<div class="right">
  <div class="form-box">
    <h1>Welcome back!</h1>
    <p>Please enter your details</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="off">
    </div>

    <div class="field pw-wrap">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="••••••••">
      <button class="toggle-pw" id="togglePw" tabindex="-1">👁</button>
    </div>

    <div class="row">
      <label><input type="checkbox" checked> Remember for 30 days</label>
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn-login">Log in</button>
    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Log in with Google
    </button>

    <div class="signup-link">Don't have an account? <a href="#">Sign Up</a></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
